<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중국어 학습 앱 — 4·5·6과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh;padding:1rem}
.app{max-width:700px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.tabs{display:flex;gap:5px;margin-bottom:1.2rem;flex-wrap:wrap}
.tab{padding:7px 13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#666;position:relative;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.badge{position:absolute;top:-6px;right:-6px;background:#e24b4a;color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.section{display:none}.section.active{display:block}

/* Card */
.card-box{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:1.5rem;text-align:center;min-height:200px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;user-select:none;transition:border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-box:hover{border-color:#aaa}
.hz{font-size:50px;line-height:1;color:#1a1a1a}
.py{font-size:18px;color:#4340b0;font-weight:600}
.tn-tag{font-size:12px;color:#0a6644;background:#e0f5ee;padding:3px 10px;border-radius:20px;display:inline-block}
.mn-text{font-size:15px;color:#555}
.ls-tag{font-size:11px;color:#3c2e8c;background:#eeecfe;padding:2px 8px;border-radius:20px;display:inline-block}
.flip-hint{font-size:11px;color:#aaa;margin-top:4px}

/* Buttons */
.btn{padding:7px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#1a1a1a;transition:all .15s}
.btn:hover{background:#f3f3f1}
.btn.prim{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.btn.prim:hover{background:#333}
.btn.ok-btn{border-color:#1d9e75;color:#085041;background:#e0f5ee}
.btn.ng-btn{border-color:#e24b4a;color:#791f1f;background:#fcebeb}
.btn-row{display:flex;gap:7px;margin-top:.8rem;justify-content:center;flex-wrap:wrap}
.know-row{display:flex;gap:8px;margin-top:.8rem;justify-content:center}

/* Progress */
.pb-wrap{background:#eee;border-radius:4px;height:4px;margin-bottom:.7rem;overflow:hidden}
.pb{height:4px;background:#4340b0;border-radius:4px;transition:width .3s}
.prog{font-size:12px;color:#888;margin-bottom:5px;display:flex;justify-content:space-between}

/* Filters */
.fr{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.fb{padding:5px 11px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#666}
.fb.active{background:#eeecfe;border-color:#4340b0;color:#3c2e8c}

/* Type pills */
.tp{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.tp button{padding:5px 11px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#666}
.tp button.active{background:#4340b0;color:#fff;border-color:#4340b0}

/* Quiz */
.q-type{font-size:11px;color:#888;font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.q-main{font-size:34px;text-align:center;color:#1a1a1a;margin:.7rem 0;padding:1rem 1.2rem;background:#f3f3f1;border-radius:12px;line-height:1.3}
.q-main.sent{font-size:19px;line-height:1.7}
.q-sub{font-size:13px;color:#777;text-align:center;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{padding:11px 14px;border:1px solid #e0e0e0;border-radius:10px;background:#fff;cursor:pointer;font-size:13px;text-align:left;color:#1a1a1a;display:flex;align-items:center;gap:8px;transition:all .15s}
.opt:hover:not(.dis){background:#f3f3f1}
.opt.ok{border-color:#1d9e75;background:#e0f5ee;color:#085041}
.opt.ng{border-color:#e24b4a;background:#fcebeb;color:#791f1f}
.opt.dis{cursor:default}
.ol{width:20px;height:20px;border-radius:50%;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#888}
.opt.ok .ol{background:#1d9e75;color:#fff;border-color:#1d9e75}
.opt.ng .ol{background:#e24b4a;color:#fff;border-color:#e24b4a}
.ex-box{margin-top:8px;padding:8px 12px;background:#f3f3f1;border-radius:8px;font-size:12px;color:#666;display:none;line-height:1.6}
.nxt-wrap{margin-top:10px;text-align:center;display:none}

/* Score */
.score-box{text-align:center;padding:1.5rem;background:#f3f3f1;border-radius:14px}
.score-num{font-size:44px;font-weight:700;color:#4340b0}

/* Vocab */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:.7rem;text-align:center}
.stat .sn{font-size:20px;font-weight:600;color:#1a1a1a}
.stat .sl{font-size:11px;color:#888;margin-top:2px}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px}
.wcard{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:10px;text-align:center}
.wcard.unk{border-color:#e24b4a;background:#fff5f5}
.wcard .whz{font-size:22px;color:#1a1a1a}
.wcard .wpy{font-size:11px;color:#4340b0;margin:3px 0;font-weight:500}
.wcard .wmn{font-size:11px;color:#666}
.wcard .wls{font-size:10px;color:#aaa;margin-top:2px}

/* Input */
input[type=text]{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:15px;color:#1a1a1a;margin:6px 0;outline:none}
input[type=text]:focus{border-color:#4340b0}
.fd{font-size:13px;margin-top:6px;padding:9px;border-radius:8px;text-align:center}
.fd.ok{background:#e0f5ee;color:#085041}
.fd.ng{background:#fcebeb;color:#791f1f}

/* Wrong note */
.empty-state{text-align:center;padding:3rem 1rem;color:#888}
.wrong-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.section-title{font-size:14px;font-weight:600;color:#1a1a1a}

/* TTS */
.speak-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid #c8c4f0;border-radius:20px;background:#f0effe;cursor:pointer;font-size:13px;color:#4340b0;font-weight:500;transition:all .15s;margin-top:6px}
.speak-btn:hover{background:#dddafc;border-color:#4340b0}
.speak-btn.speaking{background:#4340b0;color:#fff;border-color:#4340b0;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.7}}
.tts-notice{font-size:11px;color:#aaa;text-align:center;margin-top:4px}
.wcard .speak-sm{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid #c8c4f0;border-radius:20px;background:#f0effe;cursor:pointer;font-size:11px;color:#4340b0;margin-top:4px}
.wcard .speak-sm:hover{background:#dddafc}
</style>
</head>
<body>
<div class="app">
<h1>중국어 학습 앱 — 4·5·6과</h1>
<div class="tabs">
  <button class="tab active" id="t-flash" onclick="ST('flash',this)">플래시카드</button>
  <button class="tab" id="t-q5" onclick="ST('q5',this)">5지선다</button>
  <button class="tab" id="t-tone" onclick="ST('tone',this)">성조 퀴즈</button>
  <button class="tab" id="t-py" onclick="ST('py',this)">병음 쓰기</button>
  <button class="tab" id="t-wr" onclick="ST('wr',this)">오답 노트<span class="badge" id="wb" style="display:none">0</span></button>
  <button class="tab" id="t-voc" onclick="ST('voc',this)">단어장</button>
</div>

<!-- FLASH -->
<div id="flash" class="section active">
  <div class="fr" id="ff"></div>
  <div class="prog" id="fp"></div>
  <div class="pb-wrap"><div class="pb" id="fpb"></div></div>
  <div class="card-box" onclick="FC()">
    <div class="hz" id="fh"></div>
    <div id="fback" style="display:none">
      <div class="py" id="fy"></div>
      <div class="tn-tag" id="ft" style="margin:6px auto 4px;display:inline-block"></div>
      <div class="mn-text" id="fm" style="margin-top:4px"></div>
      <div class="ls-tag" id="fl" style="margin-top:6px"></div>
    </div>
    <div class="flip-hint" id="fhint">클릭해서 뒤집기 ↩</div>
  </div>
  <div style="text-align:center;margin-top:8px">
    <button class="speak-btn" id="flash-speak-btn" onclick="event.stopPropagation();speakCurrent()">🔊 발음 듣기</button>
    <div class="tts-notice" id="tts-notice" style="display:none">⚠ 브라우저에 중국어 음성이 없어요. Chrome 권장</div>
  </div>
  <p style="font-size:11px;color:#aaa;text-align:center;margin-top:4px">뒤집은 후 알면 ✓, 모르면 ✗ 눌러 오답 저장</p>
  <div class="know-row" id="kr" style="display:none">
    <button class="btn ok-btn" onclick="MK()">✓ 알아요</button>
    <button class="btn ng-btn" onclick="MD()">✗ 몰라요</button>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="PC()">← 이전</button>
    <button class="btn prim" onclick="SH()">🔀 섞기</button>
    <button class="btn" onclick="NC()">다음 →</button>
  </div>
</div>

<!-- 5지선다 -->
<div id="q5" class="section">
  <div class="tp" id="q5tp">
    <button class="active" onclick="SQT('mn',this)">뜻 고르기</button>
    <button onclick="SQT('hz',this)">한자 고르기</button>
    <button onclick="SQT('py',this)">병음 고르기</button>
    <button onclick="SQT('tn',this)">성조 고르기</button>
    <button onclick="SQT('st',this)">문장 완성</button>
    <button onclick="SQT('wr',this)">오답만</button>
  </div>
  <div class="fr" id="q5lf"></div>
  <div class="prog" id="q5pr"></div>
  <div class="pb-wrap"><div class="pb" id="q5pb"></div></div>
  <div class="q-type" id="q5qt"></div>
  <div class="q-main" id="q5qm"></div>
  <div style="text-align:center;margin-bottom:4px"><button class="speak-btn" id="q5-speak" onclick="speakEl('q5qm')">🔊 발음 듣기</button></div>
  <div class="q-sub" id="q5qs"></div>
  <div class="opts" id="q5op"></div>
  <div class="ex-box" id="q5ex"></div>
  <div class="nxt-wrap" id="q5nw"><button class="btn prim" onclick="NQ5()">다음 문제 →</button></div>
  <div id="q5sc" style="display:none"></div>
</div>

<!-- 성조 -->
<div id="tone" class="section">
  <div class="fr">
    <button class="fb active" id="ta-all" onclick="TSrc('all',this)">전체</button>
    <button class="fb" id="ta-wr" onclick="TSrc('wr',this)">오답만 <span id="twc"></span></button>
  </div>
  <div class="prog" id="tpr"></div>
  <div class="pb-wrap"><div class="pb" id="tpb"></div></div>
  <div class="q-main" id="tq"></div>
  <div style="text-align:center;margin-bottom:4px"><button class="speak-btn" onclick="speakEl('tq')">🔊 발음 듣기</button></div>
  <p style="font-size:12px;color:#888;text-align:center;margin-bottom:4px">전체 성조 조합을 고르세요 (1성=—, 2성=/, 3성=∨, 4성=\, 경성=·)</p>
  <p style="font-size:13px;color:#555;text-align:center;margin-bottom:8px;font-weight:500" id="tone-hint"></p>
  <div class="opts" id="top"></div>
  <div class="nxt-wrap" id="tnw"><button class="btn prim" onclick="NTQ()">다음 문제 →</button></div>
  <div id="tsc" style="display:none"></div>
</div>

<!-- 병음 -->
<div id="py" class="section">
  <div class="fr">
    <button class="fb active" id="pa-all" onclick="PSrc('all',this)">전체</button>
    <button class="fb" id="pa-wr" onclick="PSrc('wr',this)">오답만 <span id="pwc"></span></button>

  <p style="font-size:12px;color:#888;text-align:center">병음 입력 (예: ni hao / 성조번호 없이 써도 돼요)</p>
  <input type="text" id="pi" placeholder="병음 입력...">
  <div class="fd" id="pfd" style="display:none"></div>
  <div class="btn-row">
    <button class="btn prim" onclick="CP()">확인</button>
    <button class="btn" onclick="SP()">건너뛰기</button>
  </div>
  <div id="psc" style="display:none"></div>
</div>

<!-- 오답 노트 -->
<div id="wr" class="section">
  <div class="wrong-header">
    <p class="section-title" id="wt">오답 노트</p>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <button class="btn" onclick="RW('q5')">5지선다 재시험</button>
      <button class="btn" onclick="RW('tone')">성조 재시험</button>
      <button class="btn" onclick="RW('py')">병음 재시험</button>
      <button class="btn" style="color:#a32d2d" onclick="CW()">전체 삭제</button>
    </div>
  </div>
  <div id="wl"></div>
</div>

<!-- 단어장 -->
<div id="voc" class="section">
  <div class="stats">
    <div class="stat"><div class="sn" id="vtot"></div><div class="sl">총 단어</div></div>
    <div class="stat"><div class="sn" id="v4"></div><div class="sl">4과</div></div>
    <div class="stat"><div class="sn" id="v5"></div><div class="sl">5과</div></div>
    <div class="stat"><div class="sn" id="v6"></div><div class="sl">6과</div></div>
  </div>
  <div class="fr">
    <button class="fb active" onclick="FV('all',this)">전체</button>
    <button class="fb" onclick="FV('4',this)">4과</button>
    <button class="fb" onclick="FV('5',this)">5과</button>
    <button class="fb" onclick="FV('6',this)">6과</button>
    <button class="fb" onclick="FV('wr',this)">오답만</button>
  </div>
  <div class="word-grid" id="vg"></div>
</div>
</div>

const TN=['1성 (—)','2성 (/)','3성 (∨)','4성 (\\)','경성 (·)'];
const LB=['①','②','③','④','⑤'];

let qT='mn',qL='all',qList=[],qI=0,qS=0;
let tSrc='all',tList=[],tI=0,tS=0;
let pSrc='all',pList=[],pI=0,pS=0;

const sh=a=>[...a].sort(()=>Math.random()-.5);
const gW=l=>l==='wr'?W.filter(w=>U.has(w.hz)):l==='all'?[...W]:W.filter(w=>w.ls===l);

function UB(){

function ST(t,el){

function MK(){U.delete(fList[fI].hz);UB();NC();}
function MD(){U.add(fList[fI].hz);UB();NC();}
function NC(){fI=(fI+1)%fList.length;SFC();}

    `<button class="fb${qL===l?' active':''}" onclick="SQL('${l}',this)">${lb[i]}</button>`).join('');

}
function SQL(l,b){qL=l;document.querySelectorAll('#q5lf .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');BQ5();}
function BQ5(){
  qI=0;qS=0;
  ['q5sc','q5ex'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('q5nw').style.display='none';
  if(qT==='st'){
    let p=qL==='all'?[...SENTS]:SENTS.filter(s=>s.ls===qL);
    qList=sh(p).slice(0,Math.min(15,p.length));
  } else if(qT==='wr'){
    qList=sh(W.filter(w=>U.has(w.hz))).slice(0,20);
  } else {
    qList=sh(gW(qL)).slice(0,20);
  }
  if(!qList.length){
    document.getElementById('q5qm').className='q-main';

    document.getElementById('q5op').innerHTML='<p style="color:#888;font-size:13px">해당 단어/문장이 없어요.</p>';
    return;
  }

}
function SQ5(){
  if(qI>=qList.length){ScQ5();return;}
  const p=Math.round(qI/qList.length*100);
  document.getElementById('q5pr').innerHTML=`<span>문제 ${qI+1}/${qList.length}</span><span>점수: ${qS}</span>`;
  document.getElementById('q5pb').style.width=p+'%';
  document.getElementById('q5nw').style.display='none';
  document.getElementById('q5ex').style.display='none';
  document.getElementById('q5sc').style.display='none';

  if(qT==='st')BSt(item);
  else if(qT==='mn')BMn(item);
  else if(qT==='hz')BHz(item);
  else if(qT==='py')BPy(item);
  else if(qT==='tn')BTn(item);
  else BMn(item);
}
function BMn(w){
  document.getElementById('q5qt').textContent='뜻 고르기 — 이 단어·표현의 뜻은?';
  document.getElementById('q5qm').className='q-main';document.getElementById('q5qm').textContent=w.hz;
  document.getElementById('q5qs').textContent=w.py;
  const c=w.mn,pool=sh(W.filter(x=>x.mn!==c&&x.hz!==w.hz).map(x=>x.mn)).slice(0,4);
  RO(sh([...pool,c]),c,w,`뜻: ${c} | 병음: ${w.py}`);
}
function BHz(w){
  document.getElementById('q5qt').textContent='한자 고르기 — 이 뜻에 맞는 한자는?';
  document.getElementById('q5qm').className='q-main';document.getElementById('q5qm').textContent=w.mn;
  document.getElementById('q5qs').textContent='';
  const c=w.hz,pool=sh(W.filter(x=>x.hz!==c&&x.ls===w.ls).map(x=>x.hz)).slice(0,4);
  RO(sh([...pool,c]),c,w,`정답: ${c} (${w.py})`);
}
function BPy(w){
  document.getElementById('q5qt').textContent='병음 고르기 — 이 한자의 병음은? (성조 주의!)';
  document.getElementById('q5qm').className='q-main';document.getElementById('q5qm').textContent=w.hz;
  document.getElementById('q5qs').textContent=w.mn;
  const c=w.py,pool=sh(W.filter(x=>x.py!==c).map(x=>x.py)).slice(0,4);
  RO(sh([...pool,c]),c,w,`정답: ${c} | 뜻: ${w.mn}`);
}
function BTn(w){
  const ft=w.tn.split(' ')[0];
  const c=ft==='0'?'경성 (·)':TN[parseInt(ft)-1];
  document.getElementById('q5qt').textContent='성조 고르기 — 첫 글자 성조는? (병음은 정답 후 공개!)';
  document.getElementById('q5qm').className='q-main';document.getElementById('q5qm').textContent=w.hz;
  // 성조 문제는 병음/뜻을 미리 보여주면 답이 보이므로 숨김
  document.getElementById('q5qs').textContent='';
  let opts=[c];
  while(opts.length<5){const r=TN[Math.floor(Math.random()*5)];if(!opts.includes(r))opts.push(r);}
  RO(sh(opts),c,w,`정답: ${c} | 병음: ${w.py} | 뜻: ${w.mn} | 전체 성조: ${w.tn}`);
}
function BSt(s){
  document.getElementById('q5qt').textContent='문장 완성 — 빈칸 ___에 알맞은 글자는?';
  document.getElementById('q5qm').className='q-main sent';document.getElementById('q5qm').textContent=s.tx;
  document.getElementById('q5qs').textContent='뜻: '+s.mn;
  const c=s.ans;
  let opts=[...s.opts];
  if(!opts.includes(c))opts.push(c);
  opts=sh(opts).slice(0,5);
  if(!opts.includes(c))opts[4]=c;
  RO(sh(opts),c,null,`정답: ${c} | ${s.py}`);
}
function RO(opts,c,w,ex){
  // data-val 속성으로 정답 비교 — 텍스트 슬라이싱 오류 방지
  const safeC=encodeURIComponent(c);
  const safeHz=w?encodeURIComponent(w.hz||''):'';
  document.getElementById('q5op').innerHTML=opts.map((o,i)=>{
    const safeO=encodeURIComponent(o);
    return `<button class="opt" data-val="${safeO}" onclick="CQ5(this,'${safeO}','${safeC}','${safeHz}')"><span class="ol">${LB[i]}</span>${o}</button>`;
  }).join('');
  document.getElementById('q5ex').textContent=ex;
}
function CQ5(btn,selEnc,cEnc,hzEnc){
  const sel=decodeURIComponent(selEnc),c=decodeURIComponent(cEnc),hz=decodeURIComponent(hzEnc);
  document.querySelectorAll('#q5op .opt').forEach(b=>{b.classList.add('dis');b.onclick=null;});
  const ok=sel===c;
  if(ok){btn.classList.add('ok');qS++;if(hz)U.delete(hz);}
  else{
    btn.classList.add('ng');
    if(hz)U.add(hz);
    // data-val로 정확히 정답 버튼 찾기
    document.querySelectorAll('#q5op .opt').forEach(b=>{
      if(decodeURIComponent(b.dataset.val)===c) b.classList.add('ok');
    });
  }
  UB();document.getElementById('q5ex').style.display='block';qI++;document.getElementById('q5nw').style.display='block';
}
function NQ5(){SQ5();}
function ScQ5(){
  ['q5op','q5qm','q5qt','q5qs'].forEach(id=>{const el=document.getElementById(id);el.textContent='';if(id==='q5op')el.innerHTML='';});
  document.getElementById('q5nw').style.display='none';document.getElementById('q5ex').style.display='none';
  const p=Math.round(qS/qList.length*100),msg=p>=90?'완벽해요! 🎉':p>=70?'잘 했어요! 👍':'더 연습해봐요! 💪';
  document.getElementById('q5sc').style.display='block';
  document.getElementById('q5sc').innerHTML=`<div class="score-box"><div class="score-num">${qS}/${qList.length}</div><div style="font-size:15px;color:#666;margin-top:6px">${p}% · ${msg}</div>${U.size?`<p style="font-size:12px;color:#e24b4a;margin-top:6px">오답 ${U.size}개 오답노트 저장됨</p>`:''}<div style="display:flex;gap:7px;justify-content:center;margin-top:1rem;flex-wrap:wrap"><button class="btn prim" onclick="BQ5()">다시 풀기</button><button class="btn" onclick="RW('q5')">오답만 재시험</button></div></div>`;
}

/* ── 성조 ── */
function TSrc(s,b){tSrc=s;document.querySelectorAll('#tone .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');ITone();}
function ITone(){
  UB();const pool=tSrc==='wr'?W.filter(w=>U.has(w.hz)):[...W];
  if(!pool.length){document.getElementById('tq').textContent='오답 없음';document.getElementById('top').innerHTML='<p style="color:#888;font-size:13px">오답 노트가 비어있어요.</p>';return;}
  tList=sh(pool).slice(0,Math.min(20,pool.length));tI=0;tS=0;
  document.getElementById('tsc').style.display='none';document.getElementById('tnw').style.display='none';STQ();
}
function makeToneStr(tn){
  // "3 0 1 4" → "3성·경성·1성·4성" 형태로 변환
  return tn.split(' ').map(t=>t==='0'?'경성(·)':t+'성').join(' - ');
}
function genToneOpts(correct, allWords){
  // 오답 보기: 비슷한 길이의 다른 성조 조합으로 헷갈리게 생성
  const tnLen = correct.split(' ').length;
  const pool = allWords
    .filter(w => w.tn !== correct && w.tn.split(' ').length === tnLen)
    .map(w => makeToneStr(w.tn));
  const unique = [...new Set(pool)];
  const wrongs = sh(unique).slice(0, 4);
  let opts = [makeToneStr(correct), ...wrongs].slice(0,5);
  // 5개 못 채우면 랜덤 성조로 채우기
  const tones = ['1','2','3','4','0'];
  while(opts.length < 5){
    const fake = Array.from({length:tnLen},()=>tones[Math.floor(Math.random()*5)]).join(' ');
    const fakeStr = makeToneStr(fake);
    if(!opts.includes(fakeStr)) opts.push(fakeStr);
  }
  return sh(opts).slice(0,5);
}

function STQ(){
  if(tI>=tList.length){ScTone();return;}
  const w=tList[tI],p=Math.round(tI/tList.length*100);
  document.getElementById('tpr').innerHTML=`<span>문제 ${tI+1}/${tList.length}</span><span>점수: ${tS}</span>`;
  document.getElementById('tpb').style.width=p+'%';
  document.getElementById('tq').textContent=w.hz;
  // 뜻은 힌트로 작게 표시 (병음은 숨김 — 성조 유추 방지)
  document.getElementById('tq').title=w.mn;

  const correct=w.tn; // 전체 성조 문자열
  const correctStr=makeToneStr(correct);
  const opts=genToneOpts(correct, tList);

  const safeHz=encodeURIComponent(w.hz);
  const safeC=encodeURIComponent(correctStr);
  document.getElementById('top').innerHTML=opts.map((o,i)=>{
    const safeO=encodeURIComponent(o);
    return `<button class="opt" data-val="${safeO}" onclick="CTone(this,'${safeO}','${safeC}','${safeHz}')"><span class="ol">${LB[i]}</span>${o}</button>`;
  }).join('');
  // 뜻 힌트 표시 (병음은 정답 후 공개)
  document.getElementById('tone-hint').textContent='뜻: '+w.mn;
  document.getElementById('tnw').style.display='none';
}
function CTone(btn,selEnc,cEnc,hzEnc){
  const sel=decodeURIComponent(selEnc),c=decodeURIComponent(cEnc),hz=decodeURIComponent(hzEnc);
  const w=W.find(x=>x.hz===hz)||tList[tI-1]||{py:'',tn:''};
  document.querySelectorAll('#tone .opt').forEach(b=>{b.classList.add('dis');b.onclick=null;});
  if(sel===c){btn.classList.add('ok');tS++;U.delete(hz);}
  else{
    btn.classList.add('ng');U.add(hz);
    document.querySelectorAll('#tone .opt').forEach(b=>{
      if(decodeURIComponent(b.dataset.val)===c) b.classList.add('ok');
    });
  }
  // 정답 후 병음 공개
  document.getElementById('tone-hint').textContent=`뜻: ${w.mn} | 병음: ${w.py} | 성조: ${w.tn}`;
  UB();tI++;document.getElementById('tnw').style.display='block';
}
function NTQ(){STQ();}
function ScTone(){
  document.getElementById('top').innerHTML='';document.getElementById('tq').textContent='';document.getElementById('tnw').style.display='none';
  const p=Math.round(tS/tList.length*100);
  document.getElementById('tsc').style.display='block';
  document.getElementById('tsc').innerHTML=`<div class="score-box"><div class="score-num">${tS}/${tList.length}</div><div style="font-size:14px;color:#666;margin-top:6px">${p}% 정답</div><button class="btn prim" style="margin-top:1rem" onclick="ITone()">다시 풀기</button></div>`;
}

  pList=sh(pool).slice(0,Math.min(15,pool.length));pI=0;pS=0;
  document.getElementById('psc').style.display='none';document.getElementById('pfd').style.display='none';
  document.getElementById('pi').value='';
  document.getElementById('pi').onkeydown=e=>{if(e.key==='Enter')CP();};
  SPQ();
}
function SPQ(){
  if(pI>=pList.length){ScPy();return;}
  const p=Math.round(pI/pList.length*100);
  document.getElementById('ppr').innerHTML=`<span>문제 ${pI+1}/${pList.length}</span><span>점수: ${pS}</span>`;
  document.getElementById('ppb').style.width=p+'%';
  document.getElementById('pq').textContent=pList[pI].hz;
  document.getElementById('pfd').style.display='none';
  document.getElementById('pi').value='';
  document.getElementById('pi').focus();
}
function np(s){return s.toLowerCase().replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǜǚǘǖ]/g,'v').replace(/[1-4\s·]/g,'').trim();}
function CP(){
  const v=document.getElementById('pi').value.trim();if(!v)return;
  const w=pList[pI],ok=np(v)===np(w.py);
  const fd=document.getElementById('pfd');fd.style.display='block';fd.className='fd '+(ok?'ok':'ng');
  fd.textContent=(ok?'✓ 정답! ':'✗ 정답: ')+w.py+' ('+w.mn+')';
  if(ok){pS++;U.delete(w.hz);}else U.add(w.hz);
  UB();pI++;document.getElementById('pi').onkeydown=null;
  setTimeout(()=>{document.getElementById('pi').onkeydown=e=>{if(e.key==='Enter')CP();};if(pI>=pList.length)ScPy();else SPQ();},1800);
}
function SP(){pI++;if(pI>=pList.length)ScPy();else SPQ();}
function ScPy(){
  const p=Math.round(pS/pList.length*100);
  document.getElementById('psc').style.display='block';
  document.getElementById('psc').innerHTML=`<div class="score-box" style="margin-top:.8rem"><div class="score-num">${pS}/${pList.length}</div><div style="font-size:14px;color:#666;margin-top:6px">${p}% 정답</div><button class="btn prim" style="margin-top:1rem" onclick="IPy()">다시 풀기</button></div>`;
}

/* ── 오답노트 ── */
function RW(mode){
  if(!U.size){alert('오답 노트가 비어있어요!');return;}
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  if(mode==='q5'){
    document.getElementById('t-q5').classList.add('active');document.getElementById('q5').classList.add('active');
    document.querySelectorAll('#q5tp button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('#q5tp button')[5].classList.add('active');
    qT='wr';BQ5();
  } else if(mode==='tone'){
    document.getElementById('t-tone').classList.add('active');document.getElementById('tone').classList.add('active');
    tSrc='wr';document.getElementById('ta-all').classList.remove('active');document.getElementById('ta-wr').classList.add('active');ITone();
  } else {
    document.getElementById('t-py').classList.add('active');document.getElementById('py').classList.add('active');
    pSrc='wr';document.getElementById('pa-all').classList.remove('active');document.getElementById('pa-wr').classList.add('active');IPy();
  }
}
function RWr(){
  UB();const list=W.filter(w=>U.has(w.hz));
  document.getElementById('wt').textContent=`오답 노트 (${list.length}개)`;
  if(!list.length){document.getElementById('wl').innerHTML='<div class="empty-state"><div style="font-size:40px">✅</div><p style="margin-top:10px">오답 노트가 비어있어요!</p><p style="font-size:12px;margin-top:5px;color:#bbb">퀴즈에서 틀리거나 플래시카드에서<br>몰라요를 누르면 자동 추가됩니다</p></div>';return;}
  document.getElementById('wl').innerHTML=`<div class="word-grid">${list.map(w=>{
    const safe=encodeURIComponent(w.hz);
    return `<div class="wcard unk"><div class="whz">${w.hz}</div><div class="wpy">${w.py}</div><div class="wmn">${w.mn}</div><div class="wls">${w.ls}과 · 성조: ${w.tn}</div><div style="display:flex;gap:5px;justify-content:center;margin-top:5px"><button class="speak-sm" onclick="speakText(decodeURIComponent('${safe}'))">🔊</button><button style="font-size:11px;padding:2px 7px;border:1px solid #1d9e75;border-radius:20px;background:transparent;cursor:pointer;color:#085041" onclick="DW(decodeURIComponent('${safe}'))">삭제</button></div></div>`;
  }).join('')}</div>`;
}
function DW(hz){U.delete(hz);UB();RWr();}
function CW(){U.clear();UB();RWr();}

/* ── 단어장 ── */
function IVoc(){
  document.getElementById('vtot').textContent=W.length;
  document.getElementById('v4').textContent=W.filter(w=>w.ls==='4').length;
  document.getElementById('v5').textContent=W.filter(w=>w.ls==='5').length;
  document.getElementById('v6').textContent=W.filter(w=>w.ls==='6').length;
  RV('all');
}
function FV(l,b){document.querySelectorAll('#voc .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');RV(l);}
function RV(l){
  const list=gW(l);
  document.getElementById('vg').innerHTML=list.length?list.map(w=>{
    const safe=encodeURIComponent(w.hz);
    return `<div class="wcard${U.has(w.hz)?' unk':''}"><div class="whz">${w.hz}</div><div class="wpy">${w.py}</div><div class="wmn">${w.mn}</div><div class="wls">${w.ls}과</div><button class="speak-sm" onclick="speakText(decodeURIComponent('${safe}'))">🔊</button></div>`;
  }).join(''):'<p style="color:#888;font-size:13px">단어 없음</p>';
}

/* ── TTS 엔진 ── */
let ttsVoice = null;
let ttsReady = false;

function initTTS() {
  if (!window.speechSynthesis) return;
  const load = () => {
    const voices = speechSynthesis.getVoices();
    // 중국어 음성 우선순위: zh-CN > zh-TW > zh
    const prefer = ['zh-CN','zh_CN','zh-TW','zh_TW','zh'];
    for (const code of prefer) {
      const v = voices.find(v => v.lang.startsWith(code.replace('_','-')) || v.lang === code);
      if (v) { ttsVoice = v; ttsReady = true; break; }
    }
    if (!ttsReady && voices.length) {
      // 마지막 수단: lang에 'zh' 포함된 것
      ttsVoice = voices.find(v => v.lang.toLowerCase().includes('zh')) || null;
      ttsReady = !!ttsVoice;
    }
    if (!ttsReady) {
      document.querySelectorAll('#tts-notice').forEach(el => el.style.display = 'block');
    }
  };
  if (speechSynthesis.getVoices().length) load();
  speechSynthesis.onvoiceschanged = load;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  // 한자/병음만 추출 (한국어 제거)
  const u = new SpeechSynthesisUtterance(text);
  u.lang = ttsVoice ? ttsVoice.lang : 'zh-CN';
  if (ttsVoice) u.voice = ttsVoice;
  u.rate = 0.85;
  u.pitch = 1;

  const btn = document.querySelector('.speak-btn.speaking');
  if (btn) btn.classList.remove('speaking');

  u.onstart = () => {
    document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking'));
  };
  u.onend = () => {
    document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking'));
  };
  speechSynthesis.speak(u);
}

function speakCurrent() {
  const hz = document.getElementById('fh').textContent;
  if (!hz || hz === '단어 없음') return;
  const btn = document.getElementById('flash-speak-btn');
  btn.classList.add('speaking');
  if (!ttsReady) {
    document.getElementById('tts-notice').style.display = 'block';
    btn.classList.remove('speaking');
    return;
  }
  speak(hz);
  setTimeout(() => btn.classList.remove('speaking'), 2000);
}

function speakEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const text = el.textContent.trim();
  if (!text || text === '문제 없음') return;
  // 빈칸(___) 제거하고 읽기
  const clean = text.replace(/___/g, '').trim();
  speak(clean);
}

function speakText(text) {
  speak(text);
}

initTTS();

IF();IVoc();UB();
</script>
